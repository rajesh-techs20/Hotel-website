<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>

        nav {
            background: black;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: gold;
        }
        /* Page background */
        body {
    font-family: 'Poppins', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

/* Heading */
h1 {
    text-align: center;
    margin-top: 20px;
    color: #2c3e50;
}

/* Form container */
form {
    width: 350px;
    margin: 30px auto;
    padding: 25px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Labels */
label {
    font-weight: bold;
}

/* Inputs & Select */
input, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
}

/* Input focus effect */
input:focus, select:focus {
    border-color: green;
    outline: none;
}

/* Button */
button {
    width: 100%;
    background: green;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

/* Button hover */
button:hover {
    background: darkgreen;
}

/* Small text */
p {
    text-align: center;
    color: gray;
}
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME |</a>
        <a href="room.html">ROOMS |</a>
        <a href="gallery.html">GALLERY |</a>
        <a href="book.html">BOOK |</a>
    </nav>
    <h1>Book Your Stay</h1>
    <p>Fill the details below to reserve your room</p>

    <form onsubmit="bookNow(event)">

    <label>Name:</label><br>
    <input type="text" id="name" required><br><br>

    <label>Phone:</label><br>
    <input type="tel" id="phone" required><br><br>

    <label>Room Type:</label><br>
    <select id="room">
        <option>Deluxe</option>
        <option>Premium</option>
    </select><br><br>

    <label>Check-in Date:</label><br>
    <input type="date" id="checkin" required><br><br>

    <label>Check-out Date:</label><br>
    <input type="date" id="checkout" required><br><br>

    <label>Guests:</label><br>
    <input type="number" id="guests" min="1" max="5"><br><br>

    <button type="submit">Confirm Booking</button>

</form>
<script src="script.js"></script>
</body>
</html>
